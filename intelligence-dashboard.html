<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#080c11">
  <title>V38 Private Intelligence</title>
  <style>
    :root{color-scheme:dark;--bg:#080c11;--panel:#111821;--line:#293545;--text:#f2f6fb;--muted:#94a2b5;--accent:#78afff}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;background:radial-gradient(circle at 20% 0,rgba(120,175,255,.14),transparent 35%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:540px;margin:auto;padding:max(42px,env(safe-area-inset-top)) 18px}.card{margin-top:18vh;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px}h1{font-size:24px;margin:0}.muted{color:var(--muted);font-size:13px;line-height:1.65;margin:10px 0 18px}.status{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:11px}.home{display:block;margin-top:18px;min-height:46px;padding:13px 15px;border-radius:11px;background:var(--accent);color:#07101d;text-align:center;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <div class="wrap"><div class="card">
    <span class="status">PRIVATE MODE</span>
    <h1>V38 Private Intelligence</h1>
    <p class="muted">詳細ダッシュボードは個人専用へ切り替えました。現在は暗号化用パスフレーズの設定待ちです。旧候補一覧・期待値・Portfolio情報はこの公開ページには表示しません。</p>
    <a class="home" href="index.html">Command Hubへ戻る</a>
  </div></div>
</body>
</html>
