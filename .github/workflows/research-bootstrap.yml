name: Bootstrap complete ten-year research

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/research-bootstrap.yml"
      - ".github/workflows/research-worker.yml"
  workflow_run:
    workflows:
      - Ten-year research worker
      - Intelligence Engine (sidecar)
    types:
      - completed
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch:
    inputs:
      reset:
        description: Reset bootstrap progress and restart warmups
        required: false
        default: false
        type: boolean
      warmup_runs:
        description: Successful bounded ten-year price-history warmups required
        required: false
        default: 14
        type: number
      price_batch:
        description: Tickers extended to ten-year history per run
        required: false
        default: 250
        type: number
      stride:
        description: Trading-session stride for historical signal generation
        required: false
        default: 5
        type: number

permissions:
  contents: write
  actions: write

concurrency:
  group: bootstrap-complete-ten-year-research
  cancel-in-progress: false

jobs:
  advance:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      RESET: ${{ inputs.reset || false }}
      REQUESTED_WARMUPS: ${{ inputs.warmup_runs || 14 }}
      REQUESTED_BATCH: ${{ inputs.price_batch || 250 }}
      REQUESTED_STRIDE: ${{ inputs.stride || 5 }}
      TRIGGER_EVENT: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Inspect worker and production runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow research-worker.yml \
            --branch main \
            --event workflow_dispatch \
            --limit 50 \
            --json databaseId,status,conclusion,createdAt \
            > /tmp/research-worker-runs.json
          worker_active="$(python - <<'PY'
          import json
          runs=json.load(open('/tmp/research-worker-runs.json'))
          print(sum(run.get('status') in {'queued','in_progress','waiting','pending','requested'} for run in runs))
          PY
          )"
          engine_active="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow intelligence-engine.yml --branch main --limit 30 --json status --jq '[.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "pending" or .status == "requested")] | length')"
          echo "ACTIVE_RUNS=$((worker_active + engine_active))" >> "$GITHUB_ENV"
          echo "Active research/production runs: $((worker_active + engine_active))"

      - name: Reconcile result and select exactly one next slice
        id: next
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc)
          current_year = now.year
          target_years = list(range(current_year - 9, current_year + 1))
          state_path = Path('research-bootstrap-status.json')
          reset = os.environ.get('RESET', '').lower() == 'true'
          try:
              state = json.loads(state_path.read_text()) if state_path.exists() and not reset else {}
          except (OSError, json.JSONDecodeError):
              state = {}

          def read_json(path):
              try:
                  payload = json.loads(Path(path).read_text()) if Path(path).exists() else {}
              except (OSError, json.JSONDecodeError):
                  return {}
              return payload if isinstance(payload, dict) else {}

          def bounded_int(name, default, low, high):
              try:
                  value = int(os.environ.get(name, default))
              except (TypeError, ValueError):
                  value = default
              return max(low, min(high, value))

          def parse_time(value):
              try:
                  return datetime.fromisoformat(str(value).replace('Z', '+00:00'))
              except (TypeError, ValueError):
                  return None

          warmup_target = bounded_int('REQUESTED_WARMUPS', 14, 1, 20)
          batch = bounded_int('REQUESTED_BATCH', 250, 20, 250)
          stride = bounded_int('REQUESTED_STRIDE', 5, 1, 10)
          active_runs = bounded_int('ACTIVE_RUNS', 0, 0, 100)
          trigger_event = str(os.environ.get('TRIGGER_EVENT') or '')
          warmup_dispatched = int(state.get('warmup_runs_dispatched') or 0)
          warmup_completed = int(state.get('warmup_runs_completed') or 0)
          failures = int(state.get('failed_dispatches') or 0)
          consecutive_failures = int(state.get('consecutive_failures') or 0)
          timeouts = int(state.get('dispatch_timeouts') or 0)

          try:
              worker_runs = json.loads(Path('/tmp/research-worker-runs.json').read_text())
          except (OSError, json.JSONDecodeError):
              worker_runs = []

          awaiting = bool(state.get('awaiting_result'))
          awaiting_since = parse_time(state.get('awaiting_since'))
          awaiting_action = str(state.get('awaiting_action') or '')
          awaiting_year = state.get('awaiting_year')
          selected_run = None
          completed_this_run = False
          completed_conclusion = ''
          if awaiting:
              expected_id = str(state.get('last_workflow_run_id') or '')
              if expected_id:
                  selected_run = next((run for run in worker_runs if str(run.get('databaseId')) == expected_id), None)
              if selected_run is None and awaiting_since is not None:
                  threshold = awaiting_since - timedelta(minutes=2)
                  candidates = []
                  for run in worker_runs:
                      created = parse_time(run.get('createdAt'))
                      if created is not None and created >= threshold:
                          candidates.append((created, run))
                  if candidates:
                      selected_run = sorted(candidates, key=lambda item: item[0])[0][1]

              if selected_run is not None:
                  selected_id = selected_run.get('databaseId')
                  state['last_workflow_run_id'] = selected_id
                  status = str(selected_run.get('status') or '')
                  conclusion = str(selected_run.get('conclusion') or '')
                  if status != 'completed':
                      state['last_result'] = f'RUNNING:{status}'
                  else:
                      completed_this_run = True
                      completed_conclusion = conclusion
                      state['last_completed_workflow_run_id'] = selected_id
                      state['last_completed_workflow_conclusion'] = conclusion
                      state['last_completed_action'] = awaiting_action or None
                      state['last_completed_year'] = awaiting_year
                      if conclusion == 'success':
                          if awaiting_action == 'PRICE_WARMUP':
                              warmup_completed = min(warmup_target, warmup_completed + 1)
                          consecutive_failures = 0
                          state['last_result'] = 'SUCCESS'
                      else:
                          failures += 1
                          consecutive_failures += 1
                          state['last_failed_workflow_run_id'] = selected_id
                          state['last_failed_workflow_conclusion'] = conclusion or 'unknown'
                          state['last_result'] = f'FAILURE:{conclusion or "unknown"}'
                      awaiting = False
              elif awaiting_since is None or now - awaiting_since >= timedelta(minutes=30):
                  timeouts += 1
                  consecutive_failures += 1
                  state['last_result'] = 'DISPATCH_NOT_FOUND_RETRY'
                  awaiting = False
              else:
                  state['last_result'] = 'WAITING_FOR_RUN_REGISTRATION'

          signal_years = set()
          ranking_years = set()
          fact_years = set()
          signal_re = re.compile(r'^research-signals-year-(20\d{2})\.enc\.json$')
          ranking_re = re.compile(r'^research-rankings-year-(20\d{2})\.enc\.json$')
          fact_re = re.compile(r'^research-facts-year-(20\d{2})\.enc\.json$')
          for path in Path('private').glob('research-*-year-*.enc.json'):
              signal = signal_re.match(path.name)
              ranking = ranking_re.match(path.name)
              fact = fact_re.match(path.name)
              if signal:
                  signal_years.add(int(signal.group(1)))
              if ranking:
                  ranking_years.add(int(ranking.group(1)))
              if fact:
                  fact_years.add(int(fact.group(1)))
          completed = sorted(set(target_years) & signal_years & ranking_years)
          missing = sorted(set(target_years) - set(completed))

          success = read_json('private/research-success.json')
          worker_result = read_json('private/research-worker-result.json')
          sec_cache_file_count = max(
              int(success.get('sec_cache_file_count') or 0),
              int(worker_result.get('sec_cache_file_count') or 0),
          )
          fact_partition_count = max(
              len(fact_years),
              int(success.get('fact_partition_count') or 0),
              int(worker_result.get('fact_partition_count') or 0),
          )
          sec_data_ready = bool(success.get('sec_data_present')) or bool(worker_result.get('sec_data_ready')) or (
              sec_cache_file_count > 0 and fact_partition_count > 0
          )

          action = None
          year = None
          dispatch = False
          if awaiting:
              action = awaiting_action or 'PRICE_WARMUP'
              year = awaiting_year or current_year
          elif warmup_completed < warmup_target:
              action = 'PRICE_WARMUP'
              year = current_year
          elif missing:
              action = 'YEAR_BACKFILL'
              year = missing[0]
          else:
              action = 'COMPLETE'

          # Successful workers chain immediately. Two consecutive failures stop
          # workflow_run-triggered retries; the hourly schedule remains the recovery path.
          retry_deferred = (
              trigger_event == 'workflow_run'
              and completed_this_run
              and completed_conclusion != 'success'
              and consecutive_failures >= 2
          )
          if not awaiting and action != 'COMPLETE' and active_runs == 0 and not retry_deferred:
              dispatch = True
              warmup_dispatched += int(action == 'PRICE_WARMUP')
              awaiting = True
              state['awaiting_since'] = now.isoformat().replace('+00:00', 'Z')
              state['last_workflow_run_id'] = None
              state['last_workflow_conclusion'] = None
          elif retry_deferred:
              state['last_result'] = 'RETRY_DEFERRED_AFTER_FAILURE'
          elif not awaiting and action != 'COMPLETE' and active_runs > 0:
              state['last_result'] = 'WAITING_FOR_ENGINE_SLOT'

          status_name = action
          if active_runs > 0:
              status_name = 'WAITING_ENGINE'
          elif retry_deferred:
              status_name = 'RETRY_BACKOFF'

          state.update({
              'schema_version': '1.4',
              'updated_at': now.isoformat().replace('+00:00', 'Z'),
              'status': status_name,
              'years_retained': 10,
              'warmup_runs_target': warmup_target,
              'warmup_runs_dispatched': warmup_dispatched,
              'warmup_runs_completed': warmup_completed,
              'failed_dispatches': failures,
              'consecutive_failures': consecutive_failures,
              'dispatch_timeouts': timeouts,
              'price_batch': batch,
              'stride': stride,
              'target_years': target_years,
              'completed_years': completed,
              'missing_years': missing,
              'next_year': year,
              'awaiting_result': awaiting,
              'awaiting_action': action if awaiting else None,
              'awaiting_year': year if awaiting else None,
              'awaiting_since': state.get('awaiting_since') if awaiting else None,
              'sec_cache_file_count': sec_cache_file_count,
              'sec_fact_partition_count': fact_partition_count,
              'sec_data_ready': sec_data_ready,
              'privacy': 'Only aggregate bootstrap progress is included; no ticker, price, financial or portfolio values are stored.',
          })
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2, allow_nan=False) + '\n', encoding='utf-8')

          output = Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8') as handle:
              handle.write(f"dispatch={'true' if dispatch else 'false'}\n")
              handle.write(f"action={action or ''}\n")
              handle.write(f"year={year or ''}\n")
              # A cached SEC directory is authoritative inside the worker. The
              # controller does not force a large re-download on every retry.
              handle.write('refresh_sec=false\n')
              handle.write(f"batch={batch}\n")
              handle.write(f"stride={stride}\n")
          print(json.dumps(state, ensure_ascii=False))
          PY

      - name: Commit bootstrap progress
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research-bootstrap-status.json
          if ! git diff --staged --quiet; then
            git commit -m "Advance ten-year research bootstrap"
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then break; fi
              git fetch origin main
              git rebase origin/main || { git rebase --abort || true; exit 1; }
              sleep $((attempt * 2))
            done
          fi

      - name: Dispatch selected research worker
        if: steps.next.outputs.dispatch == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          YEAR: ${{ steps.next.outputs.year }}
          REFRESH_SEC: ${{ steps.next.outputs.refresh_sec }}
          BATCH: ${{ steps.next.outputs.batch }}
          STRIDE: ${{ steps.next.outputs.stride }}
          ACTION: ${{ steps.next.outputs.action }}
        run: |
          set -euo pipefail
          gh workflow run research-worker.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f action="$ACTION" \
            -f research_year="$YEAR" \
            -f refresh_sec="$REFRESH_SEC" \
            -f price_batch="$BATCH" \
            -f stride="$STRIDE"
          echo "Dispatched ${ACTION}: year=${YEAR}, batch=${BATCH}, stride=${STRIDE}, refresh_sec=${REFRESH_SEC}."
