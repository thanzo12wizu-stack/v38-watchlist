name: Intelligence Dashboard validation

on:
  pull_request:
    paths:
      - "intelligence_engine/intelligence_dashboard.py"
      - "intelligence_engine/presentation.py"
      - "scripts/private_crypto.mjs"
      - "tests/test_intelligence_dashboard.py"
      - "tests/test_intelligence_sprints.py"
      - ".github/workflows/intelligence-dashboard.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: intelligence-dashboard-validation-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[test]'
      - name: Test dashboard and decision presentation
        run: pytest -q tests/test_intelligence_dashboard.py tests/test_intelligence_sprints.py
      - name: Validate encrypted page does not contain plaintext
        shell: bash
        env:
          V38_PRIVATE_DASHBOARD_PASSPHRASE: validation-only-passphrase-38
        run: |
          printf '<html><body><h1>SECRET-CONTENT</h1></body></html>' >/tmp/full.html
          node scripts/private_crypto.mjs lock-html /tmp/full.html /tmp/locked.html
          grep -q 'V38 Private Intelligence' /tmp/locked.html
          if grep -q 'SECRET-CONTENT' /tmp/locked.html; then
            echo 'private dashboard plaintext leak'
            exit 1
          fi
