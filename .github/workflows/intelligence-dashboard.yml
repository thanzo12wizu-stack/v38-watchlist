name: Intelligence Dashboard

on:
  workflow_run:
    workflows: ["Intelligence Engine (sidecar)"]
    types: [completed]
  workflow_dispatch: {}
  pull_request:
    paths:
      - "intelligence_engine/intelligence_dashboard.py"
      - "tests/test_intelligence_dashboard.py"
      - ".github/workflows/intelligence-dashboard.yml"

permissions:
  contents: write

concurrency:
  group: intelligence-dashboard-main
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[test]'
      - run: pytest -q tests/test_intelligence_dashboard.py

  build:
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build standalone dashboard
        run: python -m intelligence_engine.intelligence_dashboard --input data/intelligence/index.json --output intelligence-dashboard.html
      - name: Commit standalone dashboard
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intelligence-dashboard.html
          if git diff --staged --quiet; then
            echo "No dashboard changes"
            exit 0
          fi
          git commit -m "Update standalone intelligence dashboard"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing onto latest main"
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 2))
          done
          echo "Failed to push intelligence dashboard after 3 attempts"
          exit 1
