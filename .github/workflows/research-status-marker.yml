name: Publish research process status

on:
  workflow_run:
    workflows:
      - Intelligence Engine (sidecar)
    types:
      - completed
  schedule:
    - cron: "35 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: research-process-status
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SEC_USER_AGENT_VALUE: ${{ secrets.SEC_USER_AGENT }}
      PORTFOLIO_VALUE: ${{ secrets.V38_PORTFOLIO_CSV_B64 }}
      FMP_KEY_VALUE: ${{ secrets.FMP_API_KEY }}
      FMP_TEMPLATE_VALUE: ${{ vars.V38_FMP_PRICE_URL_TEMPLATE }}
      PRICE_PROVIDER_VALUE: ${{ vars.V38_PRICE_PROVIDER }}
      WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
      WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
      WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Build authoritative privacy-safe status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          private = Path('private')
          success_path = private / 'research-success.json'
          error_path = private / 'research-error-detail.json'
          summary = private / 'research-summary.enc.json'
          success = json.loads(success_path.read_text()) if success_path.exists() else None
          error = json.loads(error_path.read_text()) if error_path.exists() else None

          datasets = {name: set() for name in ('facts', 'signals', 'outcomes', 'rankings')}
          pattern = re.compile(r'^research-(facts|signals|outcomes|rankings)-year-(20\d{2})\.enc\.json$')
          bundles = []
          for path in private.glob('research-*-year-*.enc.json'):
              match = pattern.match(path.name)
              if match:
                  datasets[match.group(1)].add(int(match.group(2)))
                  bundles.append(path)

          now = datetime.now(timezone.utc)
          target_years = set(range(now.year - 9, now.year + 1))
          completed_years = datasets['signals'] & datasets['rankings'] & target_years
          missing_years = sorted(target_years - completed_years)

          bootstrap_path = Path('research-bootstrap-status.json')
          try:
              bootstrap = json.loads(bootstrap_path.read_text()) if bootstrap_path.exists() else {}
          except (OSError, json.JSONDecodeError):
              bootstrap = {}
          conclusion = os.environ.get('WORKFLOW_RUN_CONCLUSION', '').strip()
          run_event = os.environ.get('WORKFLOW_RUN_EVENT', '').strip()
          run_id = os.environ.get('WORKFLOW_RUN_ID', '').strip()
          if run_event == 'workflow_dispatch' and conclusion and bootstrap.get('awaiting_result'):
              action = str(bootstrap.get('awaiting_action') or '')
              if conclusion == 'success':
                  if action == 'PRICE_WARMUP':
                      target = int(bootstrap.get('warmup_runs_target') or 14)
                      completed = int(bootstrap.get('warmup_runs_completed') or 0)
                      bootstrap['warmup_runs_completed'] = min(target, completed + 1)
                  bootstrap['last_result'] = 'SUCCESS'
              else:
                  bootstrap['failed_dispatches'] = int(bootstrap.get('failed_dispatches') or 0) + 1
                  bootstrap['last_result'] = f'FAILURE:{conclusion}'
              bootstrap['awaiting_result'] = False
              bootstrap['awaiting_action'] = None
              bootstrap['awaiting_year'] = None
              bootstrap['awaiting_since'] = None
              bootstrap['last_workflow_run_id'] = run_id or None
              bootstrap['last_workflow_conclusion'] = conclusion
              bootstrap['updated_at'] = now.isoformat().replace('+00:00', 'Z')
              bootstrap['completed_years'] = sorted(completed_years)
              bootstrap['missing_years'] = missing_years
              warmup_completed = int(bootstrap.get('warmup_runs_completed') or 0)
              warmup_target = int(bootstrap.get('warmup_runs_target') or 14)
              if warmup_completed < warmup_target:
                  bootstrap['status'] = 'PRICE_WARMUP'
                  bootstrap['next_year'] = now.year
              elif missing_years:
                  bootstrap['status'] = 'YEAR_BACKFILL'
                  bootstrap['next_year'] = missing_years[0]
              else:
                  bootstrap['status'] = 'COMPLETE'
                  bootstrap['next_year'] = None
              bootstrap_path.write_text(
                  json.dumps(bootstrap, ensure_ascii=False, indent=2, allow_nan=False) + '\n',
                  encoding='utf-8',
              )

          passed = bool(success) and not error and summary.exists() and bool(bundles)
          sec_configured = bool(os.environ.get('SEC_USER_AGENT_VALUE', '').strip())
          sec_cache_file_count = int((success or {}).get('sec_cache_file_count') or 0)
          sec_fact_partition_count = max(
              len(datasets['facts']),
              int((success or {}).get('fact_partition_count') or 0),
          )
          sec_data_present = bool((success or {}).get('sec_data_present')) or (
              sec_cache_file_count > 0 and sec_fact_partition_count > 0
          )
          sec_data_ready = sec_configured and sec_data_present

          status = {
              'schema_version': '2.5',
              'research_status': 'PASS' if passed else 'FAIL',
              'backfill_status': 'COMPLETE' if not missing_years else 'IN_PROGRESS',
              'updated_at': now.isoformat().replace('+00:00', 'Z'),
              'encrypted_bundle_count': len(bundles) + int(summary.exists()),
              'summary_present': summary.exists(),
              'success_marker_present': bool(success),
              'years_retained': 10,
              'target_years': sorted(target_years),
              'completed_years': sorted(completed_years),
              'missing_years': missing_years,
              'dataset_partition_counts': {name: len(years) for name, years in datasets.items()},
              'model_audit_status': (success or {}).get('model_audit_status'),
              'learning_event_rows': (success or {}).get('learning_event_rows'),
              'warmup_runs_completed': int(bootstrap.get('warmup_runs_completed') or 0),
              'warmup_runs_target': int(bootstrap.get('warmup_runs_target') or 14),
              'bootstrap_last_result': bootstrap.get('last_result'),
              'sec_cache_file_count': sec_cache_file_count,
              'sec_fact_partition_count': sec_fact_partition_count,
              'sec_data_ready': sec_data_ready,
              'error_type': None if passed else (error or {}).get('error_type', 'MissingSuccessMarker'),
              'error_message': None if passed else (error or {}).get('error_template', 'Research process did not complete cleanly.'),
              'privacy': 'No ticker, portfolio, price, financial or ranking values are included.',
          }
          Path('research-run-status.json').write_text(
              json.dumps(status, ensure_ascii=False, indent=2, allow_nan=False) + '\n', encoding='utf-8'
          )

          portfolio_ready = bool(os.environ.get('PORTFOLIO_VALUE', '').strip())
          fmp_ready = bool(os.environ.get('FMP_KEY_VALUE', '').strip()) and bool(os.environ.get('FMP_TEMPLATE_VALUE', '').strip())
          blockers = []
          if not passed:
              blockers.append('research_pipeline_not_passed')
          if missing_years:
              blockers.append('ten_year_backfill_in_progress')
          if not sec_configured:
              blockers.append('sec_user_agent_not_configured')
          elif not sec_data_ready:
              blockers.append('sec_data_not_ingested')
          if not portfolio_ready:
              blockers.append('portfolio_not_configured')
          readiness = {
              'schema_version': '1.3',
              'updated_at': now.isoformat().replace('+00:00', 'Z'),
              'research_pipeline_ready': passed,
              'ten_year_backfill_complete': not missing_years,
              'sec_user_agent_configured': sec_configured,
              'sec_cache_file_count': sec_cache_file_count,
              'sec_fact_partition_count': sec_fact_partition_count,
              'sec_data_ready': sec_data_ready,
              'portfolio_configured': portfolio_ready,
              'fmp_provider_configured': fmp_ready,
              'price_provider': os.environ.get('PRICE_PROVIDER_VALUE', '').strip() or 'default',
              'full_operational_ready': passed and not missing_years and sec_data_ready and portfolio_ready,
              'blockers': blockers,
              'privacy': 'Only configuration booleans and aggregate status are included; no secret values or holdings are stored.',
          }
          Path('research-readiness.json').write_text(
              json.dumps(readiness, ensure_ascii=False, indent=2, allow_nan=False) + '\n', encoding='utf-8'
          )
          print(json.dumps({'status': status, 'readiness': readiness, 'bootstrap': bootstrap}, ensure_ascii=False))
          PY
      - name: Commit aggregate status
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research-run-status.json research-readiness.json research-bootstrap-status.json
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "Update authoritative research status"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          exit 1
