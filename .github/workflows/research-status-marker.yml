name: Publish research process status

on:
  push:
    branches: [main]
    paths:
      - "private/research-success.json"
      - "private/research-error-detail.json"
      - "private/research-summary.enc.json"
      - "private/research-*-year-*.enc.json"

permissions:
  contents: write

concurrency:
  group: research-process-status
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Build privacy-safe status and coverage
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          private = Path('private')
          success_path = private / 'research-success.json'
          error_path = private / 'research-error-detail.json'
          summary = private / 'research-summary.enc.json'
          success = json.loads(success_path.read_text()) if success_path.exists() else None
          error = json.loads(error_path.read_text()) if error_path.exists() else None

          datasets = {name: set() for name in ('facts', 'signals', 'outcomes', 'rankings')}
          pattern = re.compile(r'^research-(facts|signals|outcomes|rankings)-year-(20\d{2})\.enc\.json$')
          bundles = []
          for path in private.glob('research-*-year-*.enc.json'):
              match = pattern.match(path.name)
              if not match:
                  continue
              datasets[match.group(1)].add(int(match.group(2)))
              bundles.append(path)

          current_year = datetime.now(timezone.utc).year
          target_years = set(range(current_year - 9, current_year + 1))
          completed_years = datasets['signals'] & datasets['rankings'] & target_years
          missing_years = sorted(target_years - completed_years)
          passed = bool(success) and not error and summary.exists() and bool(bundles)
          backfill_status = 'COMPLETE' if not missing_years else 'IN_PROGRESS'

          payload = {
              'schema_version': '2.2',
              'research_status': 'PASS' if passed else 'FAIL',
              'backfill_status': backfill_status,
              'updated_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'head_sha': os.environ.get('GITHUB_SHA'),
              'encrypted_bundle_count': len(bundles) + int(summary.exists()),
              'summary_present': summary.exists(),
              'success_marker_present': bool(success),
              'years_retained': 10,
              'target_years': sorted(target_years),
              'completed_years': sorted(completed_years),
              'missing_years': missing_years,
              'dataset_partition_counts': {name: len(years) for name, years in datasets.items()},
              'model_audit_status': (success or {}).get('model_audit_status'),
              'error_type': None if passed else (error or {}).get('error_type', 'MissingSuccessMarker'),
              'error_message': None if passed else (error or {}).get('error_template', 'Research process did not complete cleanly.'),
              'privacy': 'No ticker, portfolio, price, financial or ranking values are included.',
          }
          Path('research-run-status.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, allow_nan=False) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(payload, ensure_ascii=False))
          PY
      - name: Commit status
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research-run-status.json
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "Update research run status"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          exit 1
