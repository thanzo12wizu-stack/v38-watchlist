name: Publish research process status

on:
  workflow_run:
    workflows:
      - Intelligence Engine (sidecar)
      - Ten-year research worker
    types:
      - completed
  schedule:
    - cron: "35 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: research-process-status
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SEC_USER_AGENT_VALUE: ${{ secrets.SEC_USER_AGENT }}
      PORTFOLIO_VALUE: ${{ secrets.V38_PORTFOLIO_CSV_B64 }}
      FMP_KEY_VALUE: ${{ secrets.FMP_API_KEY }}
      FMP_TEMPLATE_VALUE: ${{ vars.V38_FMP_PRICE_URL_TEMPLATE }}
      PRICE_PROVIDER_VALUE: ${{ vars.V38_PRICE_PROVIDER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Build authoritative privacy-safe status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          private = Path('private')
          success_path = private / 'research-success.json'
          error_path = private / 'research-error-detail.json'
          summary = private / 'research-summary.enc.json'

          def read_json(path):
              try:
                  return json.loads(path.read_text()) if path.exists() else {}
              except (OSError, json.JSONDecodeError):
                  return {}

          success = read_json(success_path)
          error = read_json(error_path)
          bootstrap = read_json(Path('research-bootstrap-status.json'))

          datasets = {name: set() for name in ('facts', 'signals', 'outcomes', 'rankings')}
          pattern = re.compile(r'^research-(facts|signals|outcomes|rankings)-year-(20\d{2})\.enc\.json$')
          bundles = []
          for path in private.glob('research-*-year-*.enc.json'):
              match = pattern.match(path.name)
              if match:
                  datasets[match.group(1)].add(int(match.group(2)))
                  bundles.append(path)

          now = datetime.now(timezone.utc)
          target_years = set(range(now.year - 9, now.year + 1))
          completed_years = datasets['signals'] & datasets['rankings'] & target_years
          missing_years = sorted(target_years - completed_years)
          passed = bool(success) and not error and summary.exists() and bool(bundles)

          sec_configured = bool(os.environ.get('SEC_USER_AGENT_VALUE', '').strip())
          sec_cache_file_count = int(success.get('sec_cache_file_count') or 0)
          sec_fact_partition_count = max(
              len(datasets['facts']),
              int(success.get('fact_partition_count') or 0),
          )
          sec_data_present = bool(success.get('sec_data_present')) or (
              sec_cache_file_count > 0 and sec_fact_partition_count > 0
          )
          sec_data_ready = sec_configured and sec_data_present

          portfolio_secret_configured = bool(os.environ.get('PORTFOLIO_VALUE', '').strip())
          portfolio_mode = 'POSITIONS' if portfolio_secret_configured else 'FLAT'

          status = {
              'schema_version': '2.7',
              'research_status': 'PASS' if passed else 'FAIL',
              'backfill_status': 'COMPLETE' if not missing_years else 'IN_PROGRESS',
              'updated_at': now.isoformat().replace('+00:00', 'Z'),
              'encrypted_bundle_count': len(bundles) + int(summary.exists()),
              'summary_present': summary.exists(),
              'success_marker_present': bool(success),
              'years_retained': 10,
              'target_years': sorted(target_years),
              'completed_years': sorted(completed_years),
              'missing_years': missing_years,
              'dataset_partition_counts': {name: len(years) for name, years in datasets.items()},
              'model_audit_status': success.get('model_audit_status'),
              'learning_event_rows': success.get('learning_event_rows'),
              'warmup_runs_completed': int(bootstrap.get('warmup_runs_completed') or 0),
              'warmup_runs_target': int(bootstrap.get('warmup_runs_target') or 14),
              'bootstrap_status': bootstrap.get('status'),
              'bootstrap_last_result': bootstrap.get('last_result'),
              'bootstrap_last_run_id': bootstrap.get('last_workflow_run_id'),
              'sec_cache_file_count': sec_cache_file_count,
              'sec_fact_partition_count': sec_fact_partition_count,
              'sec_data_ready': sec_data_ready,
              'portfolio_mode': portfolio_mode,
              'error_type': None if passed else error.get('error_type', 'MissingSuccessMarker'),
              'error_message': None if passed else error.get('error_template', 'Research process did not complete cleanly.'),
              'privacy': 'No ticker, portfolio, price, financial or ranking values are included.',
          }
          Path('research-run-status.json').write_text(
              json.dumps(status, ensure_ascii=False, indent=2, allow_nan=False) + '\n', encoding='utf-8'
          )

          fmp_ready = bool(os.environ.get('FMP_KEY_VALUE', '').strip()) and bool(os.environ.get('FMP_TEMPLATE_VALUE', '').strip())
          blockers = []
          if not passed:
              blockers.append('research_pipeline_not_passed')
          if missing_years:
              blockers.append('ten_year_backfill_in_progress')
          if not sec_configured:
              blockers.append('sec_user_agent_not_configured')
          elif not sec_data_ready:
              blockers.append('sec_data_not_ingested')
          readiness = {
              'schema_version': '1.5',
              'updated_at': now.isoformat().replace('+00:00', 'Z'),
              'research_pipeline_ready': passed,
              'ten_year_backfill_complete': not missing_years,
              'sec_user_agent_configured': sec_configured,
              'sec_cache_file_count': sec_cache_file_count,
              'sec_fact_partition_count': sec_fact_partition_count,
              'sec_data_ready': sec_data_ready,
              'portfolio_configured': True,
              'portfolio_mode': portfolio_mode,
              'portfolio_secret_configured': portfolio_secret_configured,
              'fmp_provider_configured': fmp_ready,
              'price_provider': os.environ.get('PRICE_PROVIDER_VALUE', '').strip() or 'default',
              'full_operational_ready': passed and not missing_years and sec_data_ready,
              'blockers': blockers,
              'privacy': 'Only configuration booleans and aggregate status are included; no secret values or holdings are stored.',
          }
          Path('research-readiness.json').write_text(
              json.dumps(readiness, ensure_ascii=False, indent=2, allow_nan=False) + '\n', encoding='utf-8'
          )
          print(json.dumps({'status': status, 'readiness': readiness}, ensure_ascii=False))
          PY

      - name: Commit aggregate status
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research-run-status.json research-readiness.json
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "Update authoritative research status"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          exit 1
