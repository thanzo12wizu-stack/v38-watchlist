name: Ten-year research worker

on:
  workflow_dispatch:
    inputs:
      action:
        description: Bootstrap action selected by the serial controller
        required: true
        type: choice
        options:
          - PRICE_WARMUP
          - YEAR_BACKFILL
      research_year:
        description: Calendar year to materialize
        required: true
        type: string
      refresh_sec:
        description: Force-refresh SEC Company Facts before research
        required: false
        default: false
        type: boolean
      price_batch:
        description: Maximum tickers to extend to ten-year history
        required: false
        default: 250
        type: number
      stride:
        description: Trading-session stride for historical signals
        required: false
        default: 5
        type: number

permissions:
  contents: write

# Share the production mutation lock with the daily Intelligence Engine.
concurrency:
  group: intelligence-engine-main
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      V38_PRIVATE_DASHBOARD_PASSPHRASE: ${{ secrets.V38_PRIVATE_DASHBOARD_PASSPHRASE }}
      V38_PRICE_PROVIDER: ${{ vars.V38_PRICE_PROVIDER }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      V38_FMP_PRICE_URL_TEMPLATE: ${{ vars.V38_FMP_PRICE_URL_TEMPLATE }}
      RESEARCH_YEAR: ${{ inputs.research_year }}
      RESEARCH_ACTION: ${{ inputs.action }}
      RESEARCH_PRICE_BATCH: ${{ inputs.price_batch || 250 }}
      RESEARCH_STRIDE: ${{ inputs.stride || 5 }}
      REFRESH_SEC: ${{ inputs.refresh_sec || false }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[test]'

      - name: Initialize worker diagnostics
        shell: bash
        run: |
          set -euo pipefail
          printf '{"stage":"INITIALIZE","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json

      - name: Validate private research configuration
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RESEARCH_YEAR}" =~ ^20[0-9]{2}$ ]] || { echo "Invalid research year: ${RESEARCH_YEAR}"; exit 1; }
          [[ "${RESEARCH_ACTION}" == "PRICE_WARMUP" || "${RESEARCH_ACTION}" == "YEAR_BACKFILL" ]] || exit 1
          if [[ "${RESEARCH_ACTION}" == "YEAR_BACKFILL" ]]; then
            test -n "${V38_PRIVATE_DASHBOARD_PASSPHRASE:-}" || { echo "V38_PRIVATE_DASHBOARD_PASSPHRASE is required for year backfill"; exit 1; }
          fi

      - name: Restore encrypted research state
        if: inputs.action == 'YEAR_BACKFILL'
        shell: bash
        run: |
          set -euo pipefail
          printf '{"stage":"RESTORE_RESEARCH","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json
          shopt -s nullglob
          restored=0
          for encrypted in private/research-*-year-*.enc.json; do
            name="$(basename "$encrypted")"
            if [[ "$name" =~ ^research-([a-z_]+)-year-([0-9]{4})\.enc\.json$ ]]; then
              dataset="${BASH_REMATCH[1]}"
              year="${BASH_REMATCH[2]}"
              target="data/intelligence/research/${dataset}/year=${year}.jsonl.gz"
              mkdir -p "$(dirname "$target")"
              node scripts/private_crypto.mjs decrypt "$encrypted" "$target"
              restored=$((restored + 1))
            fi
          done
          if [[ -f private/research-summary.enc.json ]]; then
            node scripts/private_crypto.mjs decrypt private/research-summary.enc.json /tmp/research-summary.tar.gz
            tar -xzf /tmp/research-summary.tar.gz
            restored=$((restored + 1))
          fi
          echo "Restored research bundles: ${restored}"

      - name: Restore price cache
        uses: actions/cache/restore@v4
        with:
          path: |
            prices.pkl
            data/price-history-attempts.json
          key: intelligence-prices-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            intelligence-prices-${{ runner.os }}-

      - name: Restore SEC cache
        uses: actions/cache/restore@v4
        with:
          path: data/sec_companyfacts
          key: sec-companyfacts-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sec-companyfacts-${{ runner.os }}-

      - name: Refresh and verify SEC Company Facts
        timeout-minutes: 35
        shell: bash
        run: |
          set -euo pipefail
          printf '{"stage":"SEC_INGESTION","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json
          existing=0
          if [[ -d data/sec_companyfacts ]]; then
            existing="$(find data/sec_companyfacts -maxdepth 1 -name '*.json' -type f -size +0c | wc -l | tr -d ' ')"
          fi
          if [[ "${REFRESH_SEC}" == "true" || "$existing" == "0" ]]; then
            test -n "${SEC_USER_AGENT:-}" || { echo "SEC_USER_AGENT is required until SEC data is cached"; exit 1; }
            python -m intelligence_engine.sec_bulk --universe universe.csv --report /tmp/sec-bulk-report.json
          fi
          count=0
          if [[ -d data/sec_companyfacts ]]; then
            count="$(find data/sec_companyfacts -maxdepth 1 -name '*.json' -type f -size +0c | wc -l | tr -d ' ')"
          fi
          if (( count <= 0 )); then
            echo "SEC Company Facts ingestion produced zero files"
            exit 1
          fi
          # The selected JSON files are sufficient for every later year slice.
          # Keeping the full bulk ZIP in Actions cache is unnecessary and can
          # exceed cache/storage limits.
          rm -f data/sec/companyfacts.zip
          echo "SEC company-fact files: ${count}"

      - name: Persist verified SEC cache
        if: always() && hashFiles('data/sec_companyfacts/*.json') != ''
        uses: actions/cache/save@v4
        with:
          path: data/sec_companyfacts
          key: sec-companyfacts-${{ runner.os }}-${{ github.run_id }}

      - name: Extend resumable price cache to ten years
        timeout-minutes: 140
        shell: bash
        run: |
          set -euo pipefail
          printf '{"stage":"PRICE_WARMUP","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json
          batch="${RESEARCH_PRICE_BATCH:-250}"
          [[ "$batch" =~ ^[0-9]+$ ]] || batch=250
          (( batch < 20 )) && batch=20
          (( batch > 250 )) && batch=250
          max_slices=1
          if [[ "$RESEARCH_ACTION" == "PRICE_WARMUP" ]]; then
            max_slices=14
          fi
          for slice in $(seq 1 "$max_slices"); do
            echo "Price-history slice ${slice}/${max_slices}, batch=${batch}"
            python -m intelligence_engine.ensure_prices \
              --universe universe.csv \
              --prices prices.pkl \
              --min-coverage 0.60 \
              --history-years 10 \
              --max-history-tickers "$batch" \
              --history-attempts data/price-history-attempts.json \
              | tee /tmp/price-warmup-slice.json
            cp /tmp/price-warmup-slice.json /tmp/price-warmup-report.json
            read -r remaining slice_batch slice_received <<< "$(python -c 'import json; d=json.load(open("/tmp/price-warmup-report.json")); print(d.get("history_remaining", -1), d.get("history_batch", 0), d.get("history_received", 0))')"
            echo "Price-history progress: remaining=${remaining}, batch=${slice_batch}, received=${slice_received}"
            if [[ "$remaining" == "0" || "$slice_batch" == "0" ]]; then
              break
            fi
            # Do not hammer a temporarily unavailable provider. The cache and
            # attempt marker are persisted and the next worker resumes safely.
            if [[ "$slice_received" == "0" ]]; then
              echo "No long-history responses in this slice; defer remaining work."
              break
            fi
            sleep 2
          done

      - name: Persist price cache immediately
        if: always() && hashFiles('prices.pkl') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            prices.pkl
            data/price-history-attempts.json
          key: intelligence-prices-${{ runner.os }}-${{ github.run_id }}

      - name: Build bounded ten-year point-in-time research
        if: inputs.action == 'YEAR_BACKFILL'
        timeout-minutes: 60
        shell: bash
        run: |
          set -euo pipefail
          printf '{"stage":"YEAR_BACKFILL","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json
          stride="${RESEARCH_STRIDE:-5}"
          [[ "$stride" =~ ^[0-9]+$ ]] || stride=5
          (( stride < 1 )) && stride=1
          (( stride > 10 )) && stride=10
          python -m intelligence_engine.research_pipeline \
            --universe universe.csv \
            --prices prices.pkl \
            --sec-dir data/sec_companyfacts \
            --root data/intelligence/research \
            --mode backfill \
            --years 10 \
            --year "$RESEARCH_YEAR" \
            --stride "$stride" \
            --max-daily-signals 300 \
            --min-samples 40 \
            2>&1 | tee /tmp/research-pipeline.log

      - name: Encrypt research partitions and summary
        if: inputs.action == 'YEAR_BACKFILL'
        shell: bash
        run: |
          set -euo pipefail
          printf '{"stage":"ENCRYPT_RESEARCH","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json
          mkdir -p private
          rm -f private/research-*-year-*.enc.json private/research-summary.enc.json
          shopt -s nullglob
          encrypted_count=0
          for dataset in facts signals outcomes rankings; do
            for source in data/intelligence/research/${dataset}/year=*.jsonl.gz; do
              year="$(basename "$source" .jsonl.gz)"
              year="${year#year=}"
              target="private/research-${dataset}-year-${year}.enc.json"
              node scripts/private_crypto.mjs encrypt "$source" "$target"
              test -s "$target"
              encrypted_count=$((encrypted_count + 1))
            done
          done
          summary_files=(data/intelligence/research/*.json)
          if (( ${#summary_files[@]} == 0 )); then
            echo "Research summary files are missing"
            exit 1
          fi
          tar -czf /tmp/research-summary.tar.gz "${summary_files[@]}"
          node scripts/private_crypto.mjs encrypt /tmp/research-summary.tar.gz private/research-summary.enc.json
          test -s private/research-summary.enc.json
          encrypted_count=$((encrypted_count + 1))
          if (( encrypted_count < 3 )); then
            echo "Too few encrypted research bundles: ${encrypted_count}"
            exit 1
          fi
          echo "Encrypted research bundles: ${encrypted_count}"

      - name: Write aggregate worker result
        shell: bash
        run: |
          set -euo pipefail
          printf '{"stage":"WRITE_RESULT","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json
          python -m intelligence_engine.research_worker_status \
            --action "$RESEARCH_ACTION" \
            --research-year "$RESEARCH_YEAR" \
            --price-report /tmp/price-warmup-report.json \
            --sec-dir data/sec_companyfacts \
            --research-root data/intelligence/research \
            --private-dir private

      - name: Remove plaintext research data
        if: inputs.action == 'YEAR_BACKFILL'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf data/intelligence data/sec_companyfacts data/sec
          rm -f /tmp/research-summary.tar.gz

      - name: Commit aggregate and encrypted research outputs
        shell: bash
        run: |
          set -euo pipefail
          printf '{"stage":"COMMIT_RESULT","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A private
          if git diff --staged --quiet; then
            echo "No aggregate or encrypted research changes"
            exit 0
          fi
          if [[ "$RESEARCH_ACTION" == "PRICE_WARMUP" ]]; then
            message="Record successful ten-year price warmup"
          else
            message="Update encrypted ten-year research"
          fi
          git commit -m "$message"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              printf '{"stage":"COMPLETE","action":"%s","year":"%s"}\n' "$RESEARCH_ACTION" "$RESEARCH_YEAR" > /tmp/research-worker-stage.json
              exit 0
            fi
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; exit 1; }
            sleep $((attempt * 2))
          done
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-worker-diagnostics-${{ github.run_id }}
          path: |
            /tmp/sec-bulk-report.json
            /tmp/price-warmup-report.json
            /tmp/research-pipeline.log
            /tmp/research-worker-stage.json
            private/research-worker-result.json
          if-no-files-found: warn
