name: Audit production research run

on:
  workflow_run:
    workflows:
      - Intelligence Engine (sidecar)
    types:
      - completed

permissions:
  actions: read
  contents: write

concurrency:
  group: research-run-audit
  cancel-in-progress: false

jobs:
  audit:
    if: github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Read completed workflow log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log > /tmp/intelligence-run.log || true
      - name: Write privacy-safe research status
        shell: bash
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_CREATED_AT: ${{ github.event.workflow_run.created_at }}
          RUN_UPDATED_AT: ${{ github.event.workflow_run.updated_at }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          text = Path('/tmp/intelligence-run.log').read_text(encoding='utf-8', errors='replace')
          failed = 'Historical research did not complete' in text
          bundle_matches = re.findall(r'Encrypted research bundles:\s*(\d+)', text)
          encrypted_bundles = int(bundle_matches[-1]) if bundle_matches else 0
          completed = encrypted_bundles > 0 and not failed
          error_type = None
          error_message = None
          if failed:
              candidates = []
              for line in text.splitlines():
                  clean = re.sub(r'^.*?\t', '', line).strip()
                  match = re.search(r'([A-Za-z_][A-Za-z0-9_]*(?:Error|Exception)):\s*(.{1,240})$', clean)
                  if match:
                      candidates.append((match.group(1), match.group(2)))
              if candidates:
                  error_type, error_message = candidates[-1]
              else:
                  error_type = 'ResearchPipelineError'
                  error_message = 'The research command returned a non-zero exit status.'

          payload = {
              'schema_version': '1.0',
              'run_id': int(os.environ['RUN_ID']),
              'run_number': int(os.environ['RUN_NUMBER']),
              'workflow_conclusion': os.environ.get('RUN_CONCLUSION'),
              'head_sha': os.environ.get('HEAD_SHA'),
              'created_at': os.environ.get('RUN_CREATED_AT'),
              'updated_at': os.environ.get('RUN_UPDATED_AT'),
              'research_status': 'PASS' if completed else ('FAIL' if failed else 'NO_BUNDLE'),
              'encrypted_bundle_count': encrypted_bundles,
              'error_type': error_type,
              'error_message': error_message,
              'privacy': 'No ticker, portfolio, price, financial or ranking values are included.',
          }
          Path('research-run-status.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: research-run-audit-${{ github.event.workflow_run.id }}
          path: research-run-status.json
          if-no-files-found: error
          retention-days: 30
      - name: Commit research status
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research-run-status.json
          if git diff --staged --quiet; then
            echo "No research status changes"
            exit 0
          fi
          git commit -m "Update research run status"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              exit 1
            fi
            sleep $((attempt * 2))
          done
          exit 1
