name: Intelligence Engine (sidecar)

on:
  pull_request:
    paths:
      - "intelligence_engine/**"
      - "tests/**"
      - "scripts/private_crypto.mjs"
      - "data/theme_taxonomy.csv"
      - "portfolio.example.csv"
      - "pyproject.toml"
      - ".github/workflows/intelligence-engine.yml"
      - ".github/workflows/intelligence-dashboard.yml"
  push:
    branches:
      - main
    paths:
      - "intelligence_engine/**"
      - "scripts/private_crypto.mjs"
      - "data/theme_taxonomy.csv"
      - "portfolio.example.csv"
      - "pyproject.toml"
      - ".github/workflows/intelligence-engine.yml"
      - ".github/workflows/intelligence-dashboard.yml"
  workflow_dispatch:
    inputs:
      refresh_sec:
        description: Download SEC bulk data for this run
        required: false
        default: false
        type: boolean
      research_mode:
        description: Historical research update mode
        required: false
        default: incremental
        type: choice
        options:
          - incremental
          - backfill
      research_year:
        description: Optional calendar year for a bounded backfill, for example 2022
        required: false
        default: ""
        type: string
      research_price_batch:
        description: Maximum tickers to extend to five-year price history in this run
        required: false
        default: 120
        type: number
      research_stride:
        description: Trading-day sampling stride for research signals
        required: false
        default: 1
        type: number
  schedule:
    - cron: "25 10 * * 1-5"

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('intelligence-engine-pr-{0}', github.event.pull_request.number) || 'intelligence-engine-main' }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[test]'
      - name: Static release gate
        run: python -m intelligence_engine.release_check --root .
      - name: Offline tests including full synthetic pipeline
        shell: bash
        run: |
          set -o pipefail
          pytest -q tests 2>&1 | tee /tmp/intelligence-pytest.log
      - name: Inspect repository inputs without mutation
        run: python -m intelligence_engine.validate_inputs --universe universe.csv --prices prices.pkl --report /tmp/intelligence-input-report.json
      - name: Test private crypto round trip
        shell: bash
        env:
          V38_PRIVATE_DASHBOARD_PASSPHRASE: validation-only-passphrase-38
        run: |
          printf '<html><body>private-test</body></html>' >/tmp/private-source.html
          node scripts/private_crypto.mjs encrypt /tmp/private-source.html /tmp/private-source.enc.json
          node scripts/private_crypto.mjs decrypt /tmp/private-source.enc.json /tmp/private-roundtrip.html
          cmp /tmp/private-source.html /tmp/private-roundtrip.html
          node scripts/private_crypto.mjs lock-html /tmp/private-source.html /tmp/private-locked.html
          grep -q 'V38 Private Intelligence' /tmp/private-locked.html
          if grep -q 'private-test' /tmp/private-locked.html; then
            echo 'plaintext leaked into locked HTML'
            exit 1
          fi
      - name: Smoke-test live price adapter
        continue-on-error: true
        run: python -m intelligence_engine.smoke_prices --tickers AAPL,MSFT,NVDA,AMD --report /tmp/intelligence-price-smoke.json --strict
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: intelligence-validation-reports
          path: |
            /tmp/intelligence-pytest.log
            /tmp/intelligence-input-report.json
            /tmp/intelligence-price-smoke.json
          if-no-files-found: warn

  build:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      V38_PRICE_PROVIDER: ${{ vars.V38_PRICE_PROVIDER }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      V38_FMP_PRICE_URL_TEMPLATE: ${{ vars.V38_FMP_PRICE_URL_TEMPLATE }}
      V38_PRIVATE_DASHBOARD_PASSPHRASE: ${{ secrets.V38_PRIVATE_DASHBOARD_PASSPHRASE }}
      V38_PORTFOLIO_CSV_B64: ${{ secrets.V38_PORTFOLIO_CSV_B64 }}
      RESEARCH_MODE: ${{ inputs.research_mode || 'incremental' }}
      RESEARCH_YEAR: ${{ inputs.research_year || '' }}
      RESEARCH_PRICE_BATCH: ${{ inputs.research_price_batch || 120 }}
      RESEARCH_STRIDE: ${{ inputs.research_stride || 1 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[test]'
      - name: Restore encrypted operational and research state
        shell: bash
        run: |
          set -u
          if [[ -n "${V38_PRIVATE_DASHBOARD_PASSPHRASE:-}" && -f private/intelligence-state.enc.json ]]; then
            if node scripts/private_crypto.mjs decrypt private/intelligence-state.enc.json /tmp/intelligence-state.tar.gz \
              && tar -xzf /tmp/intelligence-state.tar.gz; then
              echo "Encrypted intelligence state restored"
            else
              echo "::warning::Encrypted operational state could not be restored; continuing from fresh observations"
              rm -f /tmp/intelligence-state.tar.gz
              rm -rf data/intelligence/history data/intelligence/observations data/external
            fi
          else
            echo "No decryptable operational state; starting from available inputs"
          fi

          if [[ -n "${V38_PRIVATE_DASHBOARD_PASSPHRASE:-}" ]]; then
            shopt -s nullglob
            restored=0
            for encrypted in private/research-*-year-*.enc.json; do
              name="$(basename "$encrypted")"
              if [[ "$name" =~ ^research-([a-z_]+)-year-([0-9]{4})\.enc\.json$ ]]; then
                dataset="${BASH_REMATCH[1]}"
                year="${BASH_REMATCH[2]}"
                target="data/intelligence/research/${dataset}/year=${year}.jsonl.gz"
                mkdir -p "$(dirname "$target")"
                if node scripts/private_crypto.mjs decrypt "$encrypted" "$target"; then
                  restored=$((restored + 1))
                else
                  echo "::warning::Could not restore ${name}; keeping the remaining research partitions"
                  rm -f "$target"
                fi
              fi
            done
            if [[ -f private/research-summary.enc.json ]]; then
              if node scripts/private_crypto.mjs decrypt private/research-summary.enc.json /tmp/research-summary.tar.gz \
                && tar -xzf /tmp/research-summary.tar.gz; then
                restored=$((restored + 1))
              else
                echo "::warning::Could not restore research summary; it will be rebuilt"
                rm -f /tmp/research-summary.tar.gz
              fi
            fi
            echo "Restored research bundles: ${restored}"
          fi

          if [[ -n "${V38_PORTFOLIO_CSV_B64:-}" ]]; then
            if printf '%s' "$V38_PORTFOLIO_CSV_B64" | base64 --decode > portfolio.csv; then
              chmod 600 portfolio.csv
            else
              echo "::warning::Portfolio secret is not valid Base64; continuing without portfolio positions"
              rm -f portfolio.csv
            fi
          fi
      - name: Restore price cache
        uses: actions/cache/restore@v4
        with:
          path: prices.pkl
          key: intelligence-prices-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            intelligence-prices-${{ runner.os }}-
      - name: Restore SEC cache
        uses: actions/cache@v4
        with:
          path: |
            data/sec_companyfacts
            data/sec/companyfacts.zip
          key: sec-companyfacts-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sec-companyfacts-${{ runner.os }}-
      - name: Refresh SEC facts when configured
        shell: bash
        run: |
          if [[ "${{ inputs.refresh_sec }}" == "true" || -z "$(find data/sec_companyfacts -name '*.json' -print -quit 2>/dev/null)" ]]; then
            if [[ -n "$SEC_USER_AGENT" ]]; then
              python -m intelligence_engine.sec_bulk --universe universe.csv
            else
              echo "SEC_USER_AGENT is not configured; continuing with nullable fundamentals"
            fi
          fi
      - name: Ensure resumable price cache
        timeout-minutes: 55
        shell: bash
        run: |
          set -euo pipefail
          command=(python -m intelligence_engine.ensure_prices --universe universe.csv --prices prices.pkl --min-coverage 0.60)
          if [[ "${RESEARCH_MODE:-incremental}" == "backfill" ]]; then
            batch="${RESEARCH_PRICE_BATCH:-120}"
            if ! [[ "$batch" =~ ^[0-9]+$ ]]; then batch=120; fi
            command+=(--history-years 5 --max-history-tickers "$batch")
          fi
          "${command[@]}"
      - name: Persist price cache immediately
        if: always() && hashFiles('prices.pkl') != ''
        uses: actions/cache/save@v4
        with:
          path: prices.pkl
          key: intelligence-prices-${{ runner.os }}-${{ github.run_id }}
      - name: Preflight full scoring pipeline
        timeout-minutes: 20
        run: python -m intelligence_engine.pipeline --universe universe.csv --prices prices.pkl
      - name: Build priority external ticker list
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          payload = json.loads(Path('data/intelligence/index.json').read_text(encoding='utf-8'))
          ordered = []
          seen = set()

          def add(value):
              ticker = str(value or '').strip().upper()
              if ticker and ticker not in seen:
                  seen.add(ticker)
                  ordered.append(ticker)

          for item in payload.get('entry_candidates') or []:
              add(item.get('ticker'))

          stocks = sorted(
              payload.get('stocks') or [],
              key=lambda item: float((item.get('scores') or {}).get('leader') or -1),
              reverse=True,
          )
          for item in stocks[:30]:
              add(item.get('ticker'))

          portfolio = Path('portfolio.csv')
          if portfolio.exists():
              try:
                  with portfolio.open(newline='', encoding='utf-8-sig') as handle:
                      rows = csv.DictReader(handle)
                      for row in rows:
                          add(row.get('ticker') or row.get('symbol'))
              except Exception as exc:
                  print(f'::warning::Could not read portfolio priority tickers: {type(exc).__name__}')

          target = Path('/tmp/external-priority.csv')
          target.write_text('ticker\n' + '\n'.join(ordered) + ('\n' if ordered else ''), encoding='utf-8')
          print(f'Priority external tickers: {len(ordered)}')
          print(','.join(ordered[:50]))
          PY
      - name: Refresh candidate external data first
        continue-on-error: true
        timeout-minutes: 8
        run: python -m intelligence_engine.external_fetch --universe /tmp/external-priority.csv --root data/external --ttl-hours 20 --max-tickers 50
      - name: Backfill external data incrementally
        continue-on-error: true
        timeout-minutes: 8
        run: python -m intelligence_engine.external_fetch --universe universe.csv --root data/external --ttl-hours 20 --max-tickers 20
      - name: Build operational intelligence and settle observations
        timeout-minutes: 25
        run: python -m intelligence_engine.command_layer --root data/intelligence --prices prices.pkl --portfolio portfolio.csv --external-root data/external
      - name: Build five-year point-in-time research
        timeout-minutes: 45
        shell: bash
        run: |
          set -u
          mode="${RESEARCH_MODE:-incremental}"
          [[ "$mode" == "backfill" ]] || mode="incremental"
          stride="${RESEARCH_STRIDE:-1}"
          if ! [[ "$stride" =~ ^[0-9]+$ ]] || (( stride < 1 )); then stride=1; fi
          command=(python -m intelligence_engine.research_pipeline --universe universe.csv --prices prices.pkl --sec-dir data/sec_companyfacts --root data/intelligence/research --mode "$mode" --years 5 --stride "$stride" --max-daily-signals 300 --min-samples 40)
          if [[ -n "${RESEARCH_YEAR:-}" ]]; then
            if [[ "$RESEARCH_YEAR" =~ ^20[0-9]{2}$ ]]; then
              command+=(--year "$RESEARCH_YEAR")
            else
              echo "::warning::Ignoring invalid research year: ${RESEARCH_YEAR}"
            fi
          fi
          if ! "${command[@]}"; then
            echo "::warning::Historical research did not complete; core intelligence remains publishable and the next run will resume"
          fi
      - name: Validate generated contract
        timeout-minutes: 5
        run: python -m intelligence_engine.validate_outputs --root data/intelligence
      - name: Check critical data availability
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload=json.loads(Path('data/intelligence/data_quality.json').read_text())
          warnings=set(payload.get('warnings', []))
          if 'qqq_missing' in warnings:
              raise SystemExit('critical data quality failure: QQQ benchmark is missing')
          if 'candidate_count_zero' in warnings:
              print('::warning::No candidates were produced; publishing the valid empty state')
          for warning in sorted(warnings - {'qqq_missing', 'candidate_count_zero'}):
              print(f'::warning::data quality: {warning}')
          PY
      - name: Build private dashboard and encrypted state
        shell: bash
        run: |
          set -euo pipefail
          python -m intelligence_engine.intelligence_dashboard --input data/intelligence/index.json --output /tmp/intelligence-dashboard.full.html
          if [[ -n "${V38_PRIVATE_DASHBOARD_PASSPHRASE:-}" ]]; then
            node scripts/private_crypto.mjs lock-html /tmp/intelligence-dashboard.full.html intelligence-dashboard.html
            test -s intelligence-dashboard.html
            grep -q 'V38 Private Intelligence' intelligence-dashboard.html
            grep -q 'ciphertext' intelligence-dashboard.html
            if grep -q '発注可能候補' intelligence-dashboard.html; then
              echo 'plaintext dashboard content leaked into locked HTML'
              exit 1
            fi
            mkdir -p private
            paths=()
            [[ -d data/intelligence/history ]] && paths+=(data/intelligence/history)
            [[ -d data/intelligence/observations ]] && paths+=(data/intelligence/observations)
            [[ -d data/external ]] && paths+=(data/external)
            [[ -f portfolio.csv ]] && paths+=(portfolio.csv)
            if (( ${#paths[@]} )); then
              tar -czf /tmp/intelligence-state.tar.gz "${paths[@]}"
              node scripts/private_crypto.mjs encrypt /tmp/intelligence-state.tar.gz private/intelligence-state.enc.json
              test -s private/intelligence-state.enc.json
            else
              echo "::warning::No operational history was available to persist"
            fi

            if [[ -d data/intelligence/research ]]; then
              rm -f private/research-*-year-*.enc.json private/research-summary.enc.json
              shopt -s nullglob
              encrypted_count=0
              for dataset in facts signals outcomes rankings; do
                for source in data/intelligence/research/${dataset}/year=*.jsonl.gz; do
                  year="$(basename "$source" .jsonl.gz)"
                  year="${year#year=}"
                  target="private/research-${dataset}-year-${year}.enc.json"
                  node scripts/private_crypto.mjs encrypt "$source" "$target"
                  test -s "$target"
                  encrypted_count=$((encrypted_count + 1))
                done
              done
              summary_files=(data/intelligence/research/*.json)
              if (( ${#summary_files[@]} )); then
                tar -czf /tmp/research-summary.tar.gz "${summary_files[@]}"
                node scripts/private_crypto.mjs encrypt /tmp/research-summary.tar.gz private/research-summary.enc.json
                test -s private/research-summary.enc.json
                encrypted_count=$((encrypted_count + 1))
              fi
              echo "Encrypted research bundles: ${encrypted_count}"
            fi
          else
            echo "Private passphrase is not configured; publishing a locked placeholder only"
            node scripts/private_crypto.mjs placeholder-html ignored intelligence-dashboard.html
          fi
          rm -f /tmp/intelligence-dashboard.full.html /tmp/intelligence-state.tar.gz /tmp/research-summary.tar.gz portfolio.csv
      - name: Remove plaintext private data from the public repository
        shell: bash
        run: |
          set -euo pipefail
          git rm -r -f --ignore-unmatch -- data/intelligence data/external portfolio.csv || true
          rm -rf -- data/intelligence data/external portfolio.csv
          find data -maxdepth 2 -type d -empty -delete || true
          remaining="$(find data/intelligence data/external -type f -print -quit 2>/dev/null || true)"
          if [[ -n "$remaining" || -e portfolio.csv ]]; then
            echo "plaintext private intelligence files remain: ${remaining:-portfolio.csv}"
            exit 1
          fi
          echo "Plaintext cleanup completed"
      - name: Commit encrypted private outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intelligence-dashboard.html
          git add -A private 2>/dev/null || true
          git add -A -- data/intelligence data/external portfolio.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No encrypted intelligence changes"
            exit 0
          fi
          git commit -m "Update encrypted private intelligence dashboard"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            echo "Push attempt ${attempt} failed; rebasing onto latest main"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Rebase failed; encrypted outputs remain local to this run"
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "Failed to push encrypted intelligence outputs after 3 attempts"
          exit 1
