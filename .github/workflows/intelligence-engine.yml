name: Intelligence Engine (sidecar)

on:
  pull_request:
    paths:
      - "intelligence_engine/**"
      - "tests/test_*intelligence.py"
      - "tests/test_external_fetch_incremental.py"
      - "pyproject.toml"
      - ".github/workflows/intelligence-engine.yml"
  workflow_dispatch:
    inputs:
      refresh_sec:
        description: Download SEC bulk data for this run
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "25 10 * * 1-5"

permissions:
  contents: write

concurrency:
  group: intelligence-engine-sidecar-main
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[test]'
      - name: Static release gate
        run: python -m intelligence_engine.release_check --root .
      - name: Offline tests
        run: pytest -q tests/test_*intelligence.py tests/test_story_missing_data.py tests/test_external_fetch_incremental.py
      - name: Inspect repository inputs without mutation
        run: python -m intelligence_engine.validate_inputs --universe universe.csv --prices prices.pkl --report /tmp/intelligence-input-report.json
      - name: Smoke-test live price adapter
        continue-on-error: true
        run: python -m intelligence_engine.smoke_prices --tickers AAPL,MSFT,NVDA,AMD --report /tmp/intelligence-price-smoke.json --strict
      - uses: actions/upload-artifact@v4
        with:
          name: intelligence-validation-reports
          path: |
            /tmp/intelligence-input-report.json
            /tmp/intelligence-price-smoke.json
          if-no-files-found: error

  build:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[test]'
      - name: Restore price cache
        id: price-cache
        uses: actions/cache/restore@v4
        with:
          path: prices.pkl
          key: intelligence-prices-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            intelligence-prices-${{ runner.os }}-
      - name: Restore SEC cache
        uses: actions/cache@v4
        with:
          path: |
            data/sec_companyfacts
            data/sec/companyfacts.zip
          key: sec-companyfacts-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sec-companyfacts-${{ runner.os }}-
      - name: Refresh SEC facts when configured
        shell: bash
        run: |
          if [[ "${{ inputs.refresh_sec }}" == "true" || -z "$(find data/sec_companyfacts -name '*.json' -print -quit 2>/dev/null)" ]]; then
            if [[ -n "$SEC_USER_AGENT" ]]; then
              python -m intelligence_engine.sec_bulk --universe universe.csv
            else
              echo "SEC_USER_AGENT is not configured; continuing with nullable fundamentals"
            fi
          fi
      - name: Ensure resumable price cache
        run: python -m intelligence_engine.ensure_prices --universe universe.csv --prices prices.pkl --min-coverage 0.70
      - name: Persist price cache immediately
        if: always() && hashFiles('prices.pkl') != ''
        uses: actions/cache/save@v4
        with:
          path: prices.pkl
          key: intelligence-prices-${{ runner.os }}-${{ github.run_id }}
      - name: Preflight full scoring pipeline
        run: python -m intelligence_engine.pipeline --universe universe.csv --prices prices.pkl
      - name: Refresh external data incrementally
        continue-on-error: true
        timeout-minutes: 12
        run: python -m intelligence_engine.external_fetch --universe universe.csv --root data/external --ttl-hours 20 --max-tickers 120
      - name: Build operational intelligence and settle observations
        run: python -m intelligence_engine.command_layer --root data/intelligence --prices prices.pkl --portfolio portfolio.csv --external-root data/external
      - name: Validate generated contract
        run: python -m intelligence_engine.validate_outputs --root data/intelligence
      - name: Fail on silent critical data outage
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=json.loads(Path('data/intelligence/data_quality.json').read_text())
          critical={'qqq_missing','candidate_count_zero'}
          hit=critical.intersection(p.get('warnings',[]))
          if hit: raise SystemExit(f'critical data quality failure: {sorted(hit)}')
          PY
      - name: Commit versioned operational outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/intelligence data/external
          if git diff --staged --quiet; then
            echo "No intelligence changes"
            exit 0
          fi
          git commit -m "Update intelligence observations and external data"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            echo "Push attempt ${attempt} failed; rebasing onto latest main"
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 2))
          done
          echo "Failed to push intelligence outputs after 3 attempts"
          exit 1
