name: Queue ten-year research backfill

on:
  pull_request:
    paths:
      - ".github/workflows/research-backfill.yml"
  workflow_dispatch:
    inputs:
      research_year:
        description: Optional calendar year; blank rotates through the latest ten years
        required: false
        default: ""
        type: string
      price_batch:
        description: Tickers to extend to ten-year price history in this run
        required: false
        default: 160
        type: number
      stride:
        description: Trading-day signal sampling stride
        required: false
        default: 1
        type: number
  schedule:
    - cron: "15 12 * * 3,6"

permissions:
  contents: read
  actions: write

concurrency:
  group: queue-ten-year-research-backfill
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate rotating year and bounded defaults
        shell: bash
        run: |
          set -euo pipefail
          current_year="$(date -u +%Y)"
          week="$(date -u +%V)"
          weekday="$(date -u +%u)"
          offset=0
          [[ "$weekday" == "6" ]] && offset=1
          index=$(( (10#$week * 2 + offset) % 10 ))
          selected=$(( current_year - 9 + index ))
          [[ "$selected" =~ ^20[0-9]{2}$ ]]
          batch=160
          stride=1
          (( batch >= 20 && batch <= 250 ))
          (( stride >= 1 && stride <= 5 ))
          echo "Validated year=${selected} batch=${batch} stride=${stride}"

  dispatch:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Select bounded research slice
        id: selection
        shell: bash
        env:
          REQUESTED_YEAR: ${{ inputs.research_year || '' }}
          REQUESTED_BATCH: ${{ inputs.price_batch || 160 }}
          REQUESTED_STRIDE: ${{ inputs.stride || 1 }}
        run: |
          set -euo pipefail
          current_year="$(date -u +%Y)"
          minimum_year=$(( current_year - 9 ))
          year="${REQUESTED_YEAR:-}"
          if [[ -z "$year" ]]; then
            week="$(date -u +%V)"
            weekday="$(date -u +%u)"
            offset=0
            [[ "$weekday" == "6" ]] && offset=1
            index=$(( (10#$week * 2 + offset) % 10 ))
            year=$(( minimum_year + index ))
          fi
          if ! [[ "$year" =~ ^20[0-9]{2}$ ]] || (( year < minimum_year || year > current_year )); then
            echo "Invalid research year: ${year}; expected ${minimum_year}-${current_year}"
            exit 1
          fi

          batch="${REQUESTED_BATCH:-160}"
          if ! [[ "$batch" =~ ^[0-9]+$ ]]; then batch=160; fi
          (( batch < 20 )) && batch=20
          (( batch > 250 )) && batch=250

          stride="${REQUESTED_STRIDE:-1}"
          if ! [[ "$stride" =~ ^[0-9]+$ ]]; then stride=1; fi
          (( stride < 1 )) && stride=1
          (( stride > 5 )) && stride=5

          echo "year=$year" >> "$GITHUB_OUTPUT"
          echo "batch=$batch" >> "$GITHUB_OUTPUT"
          echo "stride=$stride" >> "$GITHUB_OUTPUT"
          echo "Selected rolling research slice: year=${year}, price_batch=${batch}, stride=${stride}"

      - name: Queue Intelligence Engine backfill
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          YEAR: ${{ steps.selection.outputs.year }}
          BATCH: ${{ steps.selection.outputs.batch }}
          STRIDE: ${{ steps.selection.outputs.stride }}
        run: |
          set -euo pipefail
          gh workflow run intelligence-engine.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f refresh_sec=false \
            -f research_mode=backfill \
            -f research_year="$YEAR" \
            -f research_price_batch="$BATCH" \
            -f research_stride="$STRIDE"
          echo "Queued ten-year research backfill for ${YEAR}."
