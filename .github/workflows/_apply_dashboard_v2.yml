name: Apply Intelligence dashboard mobile UX

on:
  push:
    branches:
      - agent/intelligence-dashboard-mobile-ux
    paths:
      - scripts/_apply_dashboard_v2.py
      - .github/workflows/_apply_dashboard_v2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/intelligence-dashboard-mobile-ux
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply generated dashboard source
        run: python scripts/_apply_dashboard_v2.py
      - name: Validate Python syntax
        run: python -m py_compile intelligence_engine/intelligence_dashboard.py
      - name: Commit dashboard redesign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Redesign Intelligence dashboard for mobile decisions"
          git push origin HEAD:agent/intelligence-dashboard-mobile-ux
