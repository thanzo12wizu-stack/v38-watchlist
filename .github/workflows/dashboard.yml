name: Dashboard daily build

on:
  schedule:
    - cron: '0 22 * * 1-5'
  push:
    paths:
      - 'sar_state.txt'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas numpy yfinance
      - name: Build dashboard
        env:
          V38_UNIVERSE_CSV: universe.csv
          V38_SECTOR_JSON: sector_snapshot.json
          V38_OUT_HTML: index.html
        run: python build_dashboard.py
      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily dashboard rebuild"
          git push
