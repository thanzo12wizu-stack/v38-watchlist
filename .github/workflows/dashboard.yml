name: Dashboard daily build

on:
  schedule:
    # 朝一: JST 7時 = UTC 22時（米取引日の翌朝＝UTC火〜土）。起きてすぐ確認用。
    - cron: '0 22 * * 2-6'
    # 昼: JST 13時 = UTC 4時（同じくUTC火〜土）。夏時間の取りこぼし・朝のFRED障害を埋める確認用。
    - cron: '0 4 * * 2-6'
  push:
    paths:
      - 'sar_state.txt'
      - 'equity.csv'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dashboard-build-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas numpy yfinance
      - name: Build dashboard
        env:
          V38_UNIVERSE_CSV: universe.csv
          V38_SECTOR_JSON: sector_snapshot.json
          V38_OUT_HTML: index.html
          V38_MKTCAP_JSON: mktcap.json
          V38_TREND_JSON: trend_history.json
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          V38_FRED_CACHE: fred_cache.json
          V38_STATE_JSON: state.json
          V38_EQUITY_CSV: equity.csv
        run: python build_dashboard.py
      - name: Commit updated dashboard + caches
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git add mktcap.json trend_history.json fred_cache.json state.json || true

          if git diff --staged --quiet; then
            echo "No dashboard changes to commit"
            exit 0
          fi

          git commit -m "Daily dashboard rebuild + cache refresh"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed; rebasing onto latest origin/main"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Rebase conflict detected; refusing to overwrite remote changes"
              exit 1
            fi
            sleep $((attempt * 2))
          done

          echo "Push failed after 3 attempts"
          exit 1
